<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>pdf-agent 会话</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    #log { border: 1px solid #ddd; padding: 1rem; min-height: 320px; white-space: pre-wrap; }
    .user { color: #0366d6; }
    .assistant { color: #24292e; }
    .status { color: #6a737d; font-size: 0.9em; }
    input, button { font-size: 1rem; margin: 0.25rem 0; }
    #q { width: 100%; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>pdf-agent 会话（SSE）</h1>
  <p>会话 ID: <input id="sid" style="width: 280px" placeholder="先 POST /api/sessions 获取 id" />
    <button id="newSession">新建会话</button></p>
  <div id="log"></div>
  <textarea id="q" rows="3" placeholder="输入问题…"></textarea>
  <button id="send">发送</button>
  <script>
    const api = location.origin;
    const log = document.getElementById('log');
    const sidInput = document.getElementById('sid');

    document.getElementById('newSession').onclick = async () => {
      const r = await fetch(api + '/api/sessions', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
      const j = await r.json();
      sidInput.value = j.id;
      log.innerHTML = '<div class="status">已创建会话 ' + j.id + '</div>';
    };

    document.getElementById('send').onclick = async () => {
      const sid = sidInput.value.trim();
      const q = document.getElementById('q').value.trim();
      if (!sid || !q) return alert('需要会话 ID 和问题');
      log.innerHTML += '<div class="user">用户: ' + q + '</div>';
      document.getElementById('q').value = '';
      const assistant = document.createElement('div');
      assistant.className = 'assistant';
      assistant.textContent = '助手: ';
      log.appendChild(assistant);
      const res = await fetch(api + '/api/sessions/' + sid + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify({ question: q }),
      });
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop() || '';
        for (const block of parts) {
          const lines = block.split('\n');
          let ev = '', data = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) ev = line.slice(7);
            if (line.startsWith('data: ')) data = line.slice(6);
          }
          if (!ev || !data) continue;
          const obj = JSON.parse(data);
          if (ev === 'token') assistant.textContent += obj.text;
          if (ev === 'status') log.innerHTML += '<div class="status">[' + obj.stage + ']</div>';
          if (ev === 'done') {
            if (obj.revised && obj.answer !== obj.streamed_draft) {
              assistant.textContent = '助手: ' + obj.answer + ' （已根据自检修订）';
            }
          }
          if (ev === 'error') alert(obj.message);
        }
      }
      log.appendChild(document.createElement('br'));
    };
  </script>
</body>
</html>
